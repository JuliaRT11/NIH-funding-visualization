<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIH MYF Shift - Interactive Visualization</title>
    <meta name="description" content="Interactive data visualization showing the impact of NIH's shift from incremental to multi-year funded (MYF) grants">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.5.0/dist/Recharts.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-in {
            animation: fade-in 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, PieChart, Pie, LineChart, Line, Area, AreaChart } = Recharts;
        
        // Lucide icons components
        const TrendingDown = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="22 17 13.5 8.5 8.5 13.5 2 7"></polyline>
                <polyline points="16 17 22 17 22 11"></polyline>
            </svg>
        );
        
        const AlertTriangle = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
        );
        
        const DollarSign = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="12" y1="1" x2="12" y2="23"></line>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
        );
        
        const Clock = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
        );

        function NIHMYFVisualization() {
            const [activeSection, setActiveSection] = useState(0);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                setIsVisible(true);
            }, []);

            // Data for grant reduction
            const grantReductionData = [
                { year: 'Traditional', grants: 10000, label: '10,000 grants' },
                { year: 'MYF (50%)', grants: 6200, label: '6,200 grants', reduction: '-38%' },
            ];

            // Data for discussion tiers
            const discussionTiersData = [
                { name: 'Discussed', value: 33.3, color: '#2E7D32', label: 'Top Third' },
                { name: 'Competitive ND', value: 33.3, color: '#F57C00', label: 'Middle Third' },
                { name: 'Not Competitive', value: 33.3, color: '#C62828', label: 'Bottom Third' },
            ];

            // Annual awards reduction - based on DrugMonkey analysis
            // Assumes 400 total R01s with 100 expiring per year, 50/50 MYF mandate
            const annualReductionData = [
                { year: 'FY2025', potential: 100, actual: 40, traditional: 20, myf: 20 },
                { year: 'FY2026', potential: 180, actual: 72, traditional: 36, myf: 36 },
                { year: 'FY2027', potential: 245, actual: 98, traditional: 49, myf: 49 },
                { year: 'FY2028', potential: 296, actual: 118, traditional: 59, myf: 59 },
            ];

            // Funding flow comparison
            const fundingFlowData = [
                { period: 'Year 1', incremental: 20, myf: 100 },
                { period: 'Year 2', incremental: 20, myf: 0 },
                { period: 'Year 3', incremental: 20, myf: 0 },
                { period: 'Year 4', incremental: 20, myf: 0 },
                { period: 'Year 5', incremental: 20, myf: 0 },
            ];

            const sections = [
                { id: 0, title: 'Grant Volume Impact', icon: TrendingDown },
                { id: 1, title: 'Funding Flow', icon: DollarSign },
                { id: 2, title: 'Discussion Tiers', icon: AlertTriangle },
                { id: 3, title: 'Annual Reduction', icon: Clock },
            ];

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-100 p-4 md:p-8" 
                    style={{ fontFamily: '"IBM Plex Mono", "Courier New", monospace' }}>
                    
                    {/* Header */}
                    <div className={`max-w-6xl mx-auto mb-12 transition-all duration-1000 ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-8'}`}>
                        <div className="border-l-4 border-amber-500 pl-6 mb-6">
                            <h1 className="text-4xl md:text-6xl font-bold mb-3 tracking-tight" 
                                style={{ fontFamily: '"Space Mono", monospace', lineHeight: '1.1' }}>
                                THE MYF SHIFT
                            </h1>
                            <p className="text-xl md:text-2xl text-amber-500 font-semibold tracking-wide">
                                NIH's Forward Funding Revolution
                            </p>
                        </div>
                        
                        <div className="grid md:grid-cols-2 gap-4 mt-8">
                            <div className="bg-slate-800/50 border border-slate-700 p-6 rounded-lg backdrop-blur">
                                <h3 className="text-xs uppercase tracking-wider text-slate-400 mb-2">Traditional Model</h3>
                                <div className="space-y-2">
                                    <div className="flex items-start">
                                        <span className="text-red-400 mr-2">●</span>
                                        <span className="text-sm">Annual installments</span>
                                    </div>
                                    <div className="flex items-start">
                                        <span className="text-red-400 mr-2">●</span>
                                        <span className="text-sm">Shutdown vulnerable</span>
                                    </div>
                                    <div className="flex items-start">
                                        <span className="text-red-400 mr-2">●</span>
                                        <span className="text-sm">Carryover needs approval</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="bg-slate-800/50 border border-emerald-600 p-6 rounded-lg backdrop-blur">
                                <h3 className="text-xs uppercase tracking-wider text-slate-400 mb-2">MYF Model</h3>
                                <div className="space-y-2">
                                    <div className="flex items-start">
                                        <span className="text-emerald-400 mr-2">●</span>
                                        <span className="text-sm">5-year upfront payment</span>
                                    </div>
                                    <div className="flex items-start">
                                        <span className="text-emerald-400 mr-2">●</span>
                                        <span className="text-sm">Shutdown proof</span>
                                    </div>
                                    <div className="flex items-start">
                                        <span className="text-emerald-400 mr-2">●</span>
                                        <span className="text-sm">Full spending flexibility</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Navigation */}
                    <div className="max-w-6xl mx-auto mb-8 flex flex-wrap gap-2">
                        {sections.map((section) => {
                            const Icon = section.icon;
                            return (
                                <button
                                    key={section.id}
                                    onClick={() => setActiveSection(section.id)}
                                    className={`px-4 py-2 rounded-lg font-semibold text-sm transition-all duration-300 flex items-center gap-2 ${
                                        activeSection === section.id
                                            ? 'bg-amber-500 text-slate-900 shadow-lg shadow-amber-500/50'
                                            : 'bg-slate-800 text-slate-300 hover:bg-slate-700'
                                    }`}
                                >
                                    <Icon />
                                    {section.title}
                                </button>
                            );
                        })}
                    </div>

                    {/* Main Content */}
                    <div className="max-w-6xl mx-auto">
                        
                        {/* Section 0: Grant Volume Impact */}
                        {activeSection === 0 && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="bg-slate-800/30 border border-slate-700 rounded-lg p-8 backdrop-blur">
                                    <h2 className="text-2xl font-bold mb-2 text-amber-500">Active Grant Reduction</h2>
                                    <p className="text-slate-400 mb-6 text-sm">
                                        Shifting to 50% forward funding could decrease total active grants from 10,000 to 6,200
                                    </p>
                                    
                                    <ResponsiveContainer width="100%" height={350}>
                                        <BarChart data={grantReductionData} margin={{ top: 20, right: 30, left: 20, bottom: 20 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                                            <XAxis dataKey="year" stroke="#94a3b8" style={{ fontSize: '14px' }} />
                                            <YAxis stroke="#94a3b8" style={{ fontSize: '14px' }} />
                                            <Tooltip 
                                                contentStyle={{ 
                                                    backgroundColor: '#1e293b', 
                                                    border: '1px solid #475569',
                                                    borderRadius: '8px',
                                                    fontFamily: '"IBM Plex Mono", monospace'
                                                }} 
                                            />
                                            <Bar dataKey="grants" radius={[8, 8, 0, 0]}>
                                                {grantReductionData.map((entry, index) => (
                                                    <Cell key={`cell-${index}`} fill={index === 0 ? '#64748b' : '#dc2626'} />
                                                ))}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                    
                                    <div className="mt-6 grid md:grid-cols-2 gap-4">
                                        <div className="bg-slate-900/50 p-4 rounded border border-slate-700">
                                            <div className="text-4xl font-bold text-slate-300">10,000</div>
                                            <div className="text-sm text-slate-400 mt-1">Traditional grants</div>
                                        </div>
                                        <div className="bg-red-950/30 p-4 rounded border border-red-800">
                                            <div className="text-4xl font-bold text-red-400">6,200</div>
                                            <div className="text-sm text-red-300 mt-1">MYF grants (-38%)</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-amber-950/20 border border-amber-700/50 rounded-lg p-6">
                                    <div className="flex items-start gap-3">
                                        <AlertTriangle size={24} className="text-amber-500 mt-1 flex-shrink-0" />
                                        <div>
                                            <h3 className="font-bold text-amber-500 mb-2">Critical Impact on ESIs</h3>
                                            <p className="text-sm text-slate-300">
                                                Early Stage Investigators without bridge funding may struggle to survive 4-year gaps 
                                                between funding cycles, disproportionately affecting new researchers.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Section 1: Funding Flow */}
                        {activeSection === 1 && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="bg-slate-800/30 border border-slate-700 rounded-lg p-8 backdrop-blur">
                                    <h2 className="text-2xl font-bold mb-2 text-amber-500">Funding Cash Flow Comparison</h2>
                                    <p className="text-slate-400 mb-6 text-sm">
                                        How money flows over a 5-year project period
                                    </p>
                                    
                                    <ResponsiveContainer width="100%" height={350}>
                                        <AreaChart data={fundingFlowData} margin={{ top: 10, right: 30, left: 0, bottom: 0 }}>
                                            <defs>
                                                <linearGradient id="colorIncremental" x1="0" y1="0" x2="0" y2="1">
                                                    <stop offset="5%" stopColor="#64748b" stopOpacity={0.8}/>
                                                    <stop offset="95%" stopColor="#64748b" stopOpacity={0.1}/>
                                                </linearGradient>
                                                <linearGradient id="colorMYF" x1="0" y1="0" x2="0" y2="1">
                                                    <stop offset="5%" stopColor="#10b981" stopOpacity={0.8}/>
                                                    <stop offset="95%" stopColor="#10b981" stopOpacity={0.1}/>
                                                </linearGradient>
                                            </defs>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                                            <XAxis dataKey="period" stroke="#94a3b8" style={{ fontSize: '14px' }} />
                                            <YAxis stroke="#94a3b8" style={{ fontSize: '14px' }} />
                                            <Tooltip 
                                                contentStyle={{ 
                                                    backgroundColor: '#1e293b', 
                                                    border: '1px solid #475569',
                                                    borderRadius: '8px',
                                                    fontFamily: '"IBM Plex Mono", monospace'
                                                }} 
                                            />
                                            <Area 
                                                type="monotone" 
                                                dataKey="incremental" 
                                                stroke="#64748b" 
                                                fillOpacity={1} 
                                                fill="url(#colorIncremental)"
                                                name="Incremental"
                                            />
                                            <Area 
                                                type="monotone" 
                                                dataKey="myf" 
                                                stroke="#10b981" 
                                                fillOpacity={1} 
                                                fill="url(#colorMYF)"
                                                name="MYF"
                                            />
                                        </AreaChart>
                                    </ResponsiveContainer>

                                    <div className="mt-6 grid md:grid-cols-2 gap-4">
                                        <div className="bg-slate-900/50 p-4 rounded border border-slate-600">
                                            <div className="flex items-center gap-2 mb-2">
                                                <div className="w-4 h-4 bg-slate-500 rounded"></div>
                                                <h4 className="font-semibold text-slate-300">Incremental Funding</h4>
                                            </div>
                                            <p className="text-xs text-slate-400">
                                                20% of budget released each year. Creates "out-year mortgages" that tie up future budgets.
                                            </p>
                                        </div>
                                        <div className="bg-emerald-950/30 p-4 rounded border border-emerald-700">
                                            <div className="flex items-center gap-2 mb-2">
                                                <div className="w-4 h-4 bg-emerald-500 rounded"></div>
                                                <h4 className="font-semibold text-emerald-400">Forward Funding (MYF)</h4>
                                            </div>
                                            <p className="text-xs text-emerald-200">
                                                100% of 5-year budget paid upfront in Year 1. Eliminates future obligations, enables rapid pivots.
                                            </p>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-emerald-950/20 border border-emerald-700/50 rounded-lg p-6">
                                    <div className="flex items-start gap-3">
                                        <DollarSign size={24} className="text-emerald-500 mt-1 flex-shrink-0" />
                                        <div>
                                            <h3 className="font-bold text-emerald-500 mb-2">Strategic Advantage</h3>
                                            <p className="text-sm text-slate-300">
                                                MYF grants are "shutdown proof" - once awarded, the full 5-year budget is secured regardless 
                                                of future CRs or government shutdowns. Researchers can front-load high-impact equipment 
                                                purchases and data collection.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Section 2: Discussion Tiers */}
                        {activeSection === 2 && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="bg-slate-800/30 border border-slate-700 rounded-lg p-8 backdrop-blur">
                                    <h2 className="text-2xl font-bold mb-2 text-amber-500">New Discussion Tier System</h2>
                                    <p className="text-slate-400 mb-6 text-sm">
                                        Applications divided into thirds based on committee voting
                                    </p>
                                    
                                    <div className="grid md:grid-cols-3 gap-4 mb-8">
                                        <div className="bg-emerald-950/30 border border-emerald-700 p-6 rounded-lg">
                                            <div className="text-3xl font-bold text-emerald-400 mb-2">33%</div>
                                            <h4 className="font-semibold text-emerald-300 mb-1">Discussed</h4>
                                            <p className="text-xs text-slate-400">Top third - full study section review</p>
                                        </div>
                                        <div className="bg-orange-950/30 border border-orange-700 p-6 rounded-lg">
                                            <div className="text-3xl font-bold text-orange-400 mb-2">33%</div>
                                            <h4 className="font-semibold text-orange-300 mb-1">Competitive ND</h4>
                                            <p className="text-xs text-slate-400">Still eligible for funding</p>
                                        </div>
                                        <div className="bg-red-950/30 border border-red-700 p-6 rounded-lg">
                                            <div className="text-3xl font-bold text-red-400 mb-2">33%</div>
                                            <h4 className="font-semibold text-red-300 mb-1">Not Competitive</h4>
                                            <p className="text-xs text-slate-400">Not discussed, not funded</p>
                                        </div>
                                    </div>

                                    <ResponsiveContainer width="100%" height={300}>
                                        <PieChart>
                                            <Pie
                                                data={discussionTiersData}
                                                cx="50%"
                                                cy="50%"
                                                innerRadius={60}
                                                outerRadius={110}
                                                paddingAngle={2}
                                                dataKey="value"
                                            >
                                                {discussionTiersData.map((entry, index) => (
                                                    <Cell key={`cell-${index}`} fill={entry.color} />
                                                ))}
                                            </Pie>
                                            <Tooltip 
                                                contentStyle={{ 
                                                    backgroundColor: '#1e293b', 
                                                    border: '1px solid #475569',
                                                    borderRadius: '8px',
                                                    fontFamily: '"IBM Plex Mono", monospace'
                                                }} 
                                            />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>

                                <div className="bg-orange-950/20 border border-orange-700/50 rounded-lg p-6">
                                    <div className="flex items-start gap-3">
                                        <AlertTriangle size={24} className="text-orange-500 mt-1 flex-shrink-0" />
                                        <div>
                                            <h3 className="font-bold text-orange-500 mb-2">The "Competitive ND" Strategy</h3>
                                            <p className="text-sm text-slate-300 mb-3">
                                                If your grant falls in the middle tier, contact your Program Officer to explain how you'll 
                                                use the lump sum to front-load high-impact equipment or data collection in Year 1.
                                            </p>
                                            <p className="text-xs text-slate-400 italic">
                                                Note: NIH no longer permits paylines - each funding decision must be individually justified 
                                                based on priorities and strategic plans.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Section 3: Annual Reduction */}
                        {activeSection === 3 && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="bg-slate-800/30 border border-slate-700 rounded-lg p-8 backdrop-blur">
                                    <h2 className="text-2xl font-bold mb-2 text-amber-500">The Year-by-Year Impact</h2>
                                    <p className="text-slate-400 mb-6 text-sm">
                                        DrugMonkey's "spherical cow" analysis: Assuming 400 total R01s with 100 expiring annually
                                    </p>
                                    
                                    <ResponsiveContainer width="100%" height={400}>
                                        <BarChart data={annualReductionData} margin={{ top: 20, right: 30, left: 20, bottom: 20 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                                            <XAxis dataKey="year" stroke="#94a3b8" style={{ fontSize: '14px' }} />
                                            <YAxis stroke="#94a3b8" style={{ fontSize: '14px' }} />
                                            <Tooltip 
                                                contentStyle={{ 
                                                    backgroundColor: '#1e293b', 
                                                    border: '1px solid #475569',
                                                    borderRadius: '8px',
                                                    fontFamily: '"IBM Plex Mono", monospace'
                                                }} 
                                            />
                                            <Bar dataKey="potential" fill="#475569" name="Potential (if no MYF)" radius={[4, 4, 0, 0]} opacity={0.5} />
                                            <Bar dataKey="actual" fill="#dc2626" name="Actual Awards" radius={[4, 4, 0, 0]} />
                                        </BarChart>
                                    </ResponsiveContainer>

                                    <div className="mt-6 grid md:grid-cols-4 gap-3">
                                        <div className="bg-slate-900/50 p-4 rounded border border-slate-700">
                                            <div className="text-xs text-slate-400 mb-1">FY2025</div>
                                            <div className="text-2xl font-bold text-red-400">40</div>
                                            <div className="text-xs text-slate-500">vs 100 potential</div>
                                        </div>
                                        <div className="bg-slate-900/50 p-4 rounded border border-slate-700">
                                            <div className="text-xs text-slate-400 mb-1">FY2026</div>
                                            <div className="text-2xl font-bold text-red-400">72</div>
                                            <div className="text-xs text-slate-500">vs 180 potential</div>
                                        </div>
                                        <div className="bg-slate-900/50 p-4 rounded border border-slate-700">
                                            <div className="text-xs text-slate-400 mb-1">FY2027</div>
                                            <div className="text-2xl font-bold text-red-400">98</div>
                                            <div className="text-xs text-slate-500">vs 245 potential</div>
                                        </div>
                                        <div className="bg-slate-900/50 p-4 rounded border border-slate-700">
                                            <div className="text-xs text-slate-400 mb-1">FY2028</div>
                                            <div className="text-2xl font-bold text-red-400">118</div>
                                            <div className="text-xs text-slate-500">vs 296 potential</div>
                                        </div>
                                    </div>

                                    <div className="mt-6 bg-orange-950/20 border border-orange-700/50 rounded-lg p-5">
                                        <h4 className="font-semibold text-orange-400 mb-3 text-sm">The Persistent 60% Gap</h4>
                                        <p className="text-xs text-slate-300 mb-2">
                                            While the absolute number of awards increases each year (40→72→98→118), each fiscal year 
                                            still represents a 60% reduction from the potential awards if NIH returned to traditional funding.
                                        </p>
                                        <p className="text-xs text-slate-400 italic">
                                            This assumes the 50/50 MYF mandate continues and grants average 4 years of competing support.
                                        </p>
                                    </div>

                                    <div className="mt-6 bg-red-950/30 border border-red-800 p-6 rounded-lg">
                                        <div className="grid md:grid-cols-2 gap-6">
                                            <div>
                                                <h4 className="font-semibold text-red-400 mb-2">Payline Collapse</h4>
                                                <div className="text-5xl font-bold text-red-400 mb-2">4th</div>
                                                <p className="text-sm text-slate-300">
                                                    Percentile at NCI (end of FY2025) - down from ~7th percentile and historical averages in the teens
                                                </p>
                                            </div>
                                            <div>
                                                <h4 className="font-semibold text-red-400 mb-2">Success Rate Plunge</h4>
                                                <div className="text-5xl font-bold text-red-400 mb-2">~10%</div>
                                                <p className="text-sm text-slate-300">
                                                    Expected success rate, down from ~20% in recent years. Assumes proposal volume doesn't increase.
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-slate-800/50 border border-slate-600 rounded-lg p-6">
                                    <h3 className="font-bold text-slate-200 mb-3">Understanding the Analysis</h3>
                                    <div className="space-y-3">
                                        <div className="flex items-start gap-3">
                                            <div className="w-2 h-2 bg-amber-500 rounded-full mt-2 flex-shrink-0"></div>
                                            <p className="text-sm text-slate-300">
                                                <strong>The Model:</strong> Based on an IC with 400 R01s total, 100 expiring each year, all funded for 4 years
                                            </p>
                                        </div>
                                        <div className="flex items-start gap-3">
